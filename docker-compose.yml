version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: "test:bot-token"
      GROQ_API_KEY: "test-groq-key"
      OPENAI_API_KEY: "test-openai-key"
      OPENAI_MODEL: "gpt-4o"
      ALLOWED_USERS_FILE: "/app/allowed_users.txt"
      PREFS_FILE: "/app/data/prefs.json"
      LOG_LEVEL: "debug"
      POLLING_MODE: "long_polling"
    volumes:
      - ./allowed_users.txt:/app/allowed_users.txt:ro
      - ./data:/app/data
    depends_on:
      - mock-telegram
      - mock-groq
    restart: unless-stopped

  mock-telegram:
    image: alpine:3.19
    command: >
      sh -c "apk add --no-cache socat &&
             while true; do
               echo -e 'HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n{\"ok\":true,\"result\":[]}' |
               socat - TCP-LISTEN:8081,reuseaddr,fork;
             done"
    ports:
      - "8081:8081"

  mock-groq:
    image: alpine:3.19
    command: >
      sh -c "apk add --no-cache socat &&
             while true; do
               echo -e 'HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n{\"text\":\"integration test transcription\"}' |
               socat - TCP-LISTEN:8082,reuseaddr,fork;
             done"
    ports:
      - "8082:8082"
